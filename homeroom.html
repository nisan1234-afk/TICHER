<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה פלוס — דשבורד מחנך</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937; --dark4: #374151;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --warning: #F59E0B;
      --teal: #14B8A6; --purple: #8B5CF6; --purple-light: #A78BFA;
      --amber: #F59E0B;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    .topbar { background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-badge { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: var(--amber); border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 700; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .btn-back { padding: 7px 14px; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; }
    .btn-back:hover { border-color: var(--blue); color: var(--blue-light); }
    .btn-logout { padding: 7px 14px; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
    .user-name { font-size: 14px; font-weight: 700; }

    .main { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    .page-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px 20px; }
    .stat-num { font-size: 30px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* CLASS OVERVIEW */
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 700; }

    /* STUDENT GRID */
    .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .student-card { background: var(--dark3); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; transition: all 0.2s; }
    .student-card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .student-card.alert { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.04); }
    .student-card.good { border-color: rgba(16,185,129,0.2); }
    .student-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .student-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; flex-shrink: 0; }
    .student-name { font-size: 14px; font-weight: 700; }
    .student-email { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* PROGRESS BARS per subject */
    .subject-progress { margin-bottom: 10px; }
    .subject-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-size: 12px; }
    .subject-name-label { color: var(--muted); }
    .subject-pct { font-weight: 700; font-size: 12px; }
    .progress-bar { height: 6px; background: var(--dark4); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .fill-teal  { background: linear-gradient(90deg, var(--teal), var(--blue)); }
    .fill-blue  { background: linear-gradient(90deg, var(--blue), var(--purple)); }
    .fill-green { background: var(--success); }

    .student-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .last-active-label { font-size: 11px; }
    .last-active-label.recent { color: var(--success); }
    .last-active-label.old { color: var(--error); }
    .last-active-label.mid { color: var(--warning); }

    /* SUBJECT COMPARISON TABLE */
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 11px 14px; text-align: right; background: var(--dark3); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.07); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-error   { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }

    /* TABS */
    .tabs-row { display: flex; gap: 4px; margin-bottom: 24px; background: var(--dark2); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.07); width: fit-content; }
    .tab-btn { padding: 9px 20px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--amber); color: white; font-weight: 700; }

    .screen { display: none; }
    .screen.show { display: block; }

    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 16px; }
      .student-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">כיתה פלוס</div>
    <div class="topbar-badge">🏠 מחנך</div>
  </div>
  <div class="topbar-right">
    <div class="user-name" id="userName">טוען...</div>
    <button class="btn-back" onclick="goBack()">← חזרה לדשבורד</button>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="main">
  <div class="page-title" id="pageTitle">ניהול כיתה</div>
  <div class="page-sub">מעקב התקדמות כללי בכל המקצועות — צפייה בלבד</div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statStudents" style="color:var(--blue-light)">—</div>
      <div class="stat-label">תלמידים בכיתה</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--success)">—</div>
      <div class="stat-label">פעילים השבוע</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statAvg" style="color:var(--teal)">—</div>
      <div class="stat-label">התקדמות ממוצעת</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statAlert" style="color:var(--error)">—</div>
      <div class="stat-label">דורשים תשומת לב</div>
    </div>
  </div>

  <div class="tabs-row">
    <button class="tab-btn active" onclick="switchTab('cards', this)">כרטיסי תלמידים</button>
    <button class="tab-btn" onclick="switchTab('table', this)">טבלת השוואה</button>
  </div>

  <!-- כרטיסי תלמידים -->
  <div class="screen show" id="tab-cards">
    <div class="student-grid" id="studentGrid">
      <div class="empty-state"><span class="loading-spinner"></span> טוען נתוני כיתה...</div>
    </div>
  </div>

  <!-- טבלת השוואה -->
  <div class="screen" id="tab-table">
    <div class="card">
      <div class="card-title">השוואת התקדמות — כל המקצועות</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>תלמיד</th>
              <th>תיירות דיגיטלית</th>
              <th>מקצוע 2</th>
              <th>מקצוע 3</th>
              <th>סה"כ</th>
              <th>פעילות אחרונה</th>
            </tr>
          </thead>
          <tbody id="comparisonBody">
            <tr><td colspan="6" class="empty-state"><span class="loading-spinner"></span> טוען...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
const TICHER_URL = 'https://nisan1234-afk.github.io/TICHER/';
const API_URL    = 'https://script.google.com/macros/s/AKfycbwf3-MNZBBi64zXcNH7wfhBRoEBl9brtQ9QRI4Won5RmUIOrl_WBivN6uI5NAp6Mc0h/exec';

let currentUser = null;
let groupsData  = [];

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);

  const roles = currentUser.roles || [currentUser.role];
  if (!roles.includes('homeroom') && !roles.includes('admin')) {
    window.location.href = TICHER_URL;
    return;
  }

  document.getElementById('userName').textContent = currentUser.name || currentUser.email;
  await loadData();
};

async function callAPI(action, params = {}) {
  const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: currentUser.token, ...params }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function loadData() {
  try {
    const data = await callAPI('getTeacherDashboard');
    groupsData = data.groups || [];

    // סטטיסטיקות
    const uniqueStudents = new Set();
    groupsData.forEach(g => (g.members || []).forEach(m => uniqueStudents.add(m)));

    const activeThisWeek = groupsData.filter(g => {
      if (!g.last_active) return false;
      return Date.now() - new Date(g.last_active).getTime() < 7 * 24 * 60 * 60 * 1000;
    }).length;

    const avg   = groupsData.length ? Math.round(groupsData.reduce((s, g) => s + g.percent, 0) / groupsData.length) : 0;
    const alert = groupsData.filter(g => {
      if (!g.last_active) return true;
      return Date.now() - new Date(g.last_active).getTime() > 7 * 24 * 60 * 60 * 1000;
    }).length;

    document.getElementById('statStudents').textContent = uniqueStudents.size;
    document.getElementById('statActive').textContent   = activeThisWeek;
    document.getElementById('statAvg').textContent      = avg + '%';
    document.getElementById('statAlert').textContent    = alert;

    renderStudentCards();
    renderComparisonTable();
  } catch(e) {
    document.getElementById('studentGrid').innerHTML = '<div class="empty-state">שגיאה: ' + e.message + '</div>';
  }
}

function renderStudentCards() {
  const grid = document.getElementById('studentGrid');
  if (!groupsData.length) {
    grid.innerHTML = '<div class="empty-state">אין קבוצות רשומות בכיתה</div>';
    return;
  }

  grid.innerHTML = groupsData.map(g => {
    const diff     = g.last_active ? Date.now() - new Date(g.last_active).getTime() : Infinity;
    const days     = Math.floor(diff / 86400000);
    const isAlert  = days > 7;
    const isGood   = days < 2;
    const cardClass = isAlert ? 'alert' : isGood ? 'good' : '';

    const timeLabel = !g.last_active ? 'לא פעיל' :
      days === 0 ? 'פעיל היום' :
      days === 1 ? 'אתמול' :
      'לפני ' + days + ' ימים';
    const timeClass = isGood ? 'recent' : isAlert ? 'old' : 'mid';

    const members    = g.members || [];
    const namesLabel = members.length ? members.map(m => m.split('@')[0]).join(' + ') : (g.group_name || '—');
    const avatarLetter = (g.group_name || members[0] || '?')[0].toUpperCase();

    return `
      <div class="student-card ${cardClass}">
        <div class="student-header">
          <div class="student-avatar">${avatarLetter}</div>
          <div>
            <div class="student-name">${g.group_name || namesLabel}</div>
            <div class="student-email">${g.site_name || 'אתר לא נבחר עדיין'}</div>
          </div>
        </div>

        <div class="subject-progress">
          <div class="subject-label">
            <span class="subject-name-label">🗺️ תיירות דיגיטלית</span>
            <span class="subject-pct" style="color:var(--teal)">${g.percent}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill fill-teal" style="width:${g.percent}%"></div>
          </div>
        </div>

        <div class="subject-progress">
          <div class="subject-label">
            <span class="subject-name-label">📐 מקצוע 2</span>
            <span class="subject-pct" style="color:var(--muted)">—</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill fill-blue" style="width:0%"></div>
          </div>
        </div>

        <div class="student-footer">
          <span class="last-active-label ${timeClass}">${isAlert ? '⚠️ ' : ''}${timeLabel}</span>
          <span style="font-size:11px;color:var(--muted)">סעיף ${g.current_section || '—'} / 8</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderComparisonTable() {
  const tbody = document.getElementById('comparisonBody');
  if (!groupsData.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">אין נתונים</td></tr>';
    return;
  }

  tbody.innerHTML = groupsData.map(g => {
    const diff  = g.last_active ? Date.now() - new Date(g.last_active).getTime() : Infinity;
    const days  = Math.floor(diff / 86400000);
    const badge = days > 7 ? '<span class="badge badge-error">⚠️ ' + days + ' ימים</span>'
      : days > 2 ? '<span class="badge badge-warning">' + days + ' ימים</span>'
      : '<span class="badge badge-success">פעיל</span>';

    const members    = g.members || [];
    const namesLabel = members.map(m => m.split('@')[0]).join(', ') || '—';

    const tourismBar = `<div style="display:flex;align-items:center;gap:8px;min-width:120px;">
      <div style="flex:1;height:5px;background:var(--dark4);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${g.percent}%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:3px;"></div>
      </div>
      <span style="font-size:11px;font-weight:700;color:var(--teal);min-width:28px;">${g.percent}%</span>
    </div>`;

    return `<tr>
      <td><strong>${g.group_name || namesLabel}</strong><br><span style="font-size:11px;color:var(--muted)">${namesLabel}</span></td>
      <td>${tourismBar}</td>
      <td><span style="color:var(--muted);font-size:12px;">—</span></td>
      <td><span style="color:var(--muted);font-size:12px;">—</span></td>
      <td><strong style="color:var(--blue-light)">${g.percent}%</strong></td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('show');
}

function goBack() { window.location.href = 'teacher.html'; }
function logout() { sessionStorage.removeItem('kitahUser'); window.location.href = TICHER_URL; }
</script>
</body>
</html>

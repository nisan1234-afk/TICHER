<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה פלוס — דשבורד מורה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937; --dark4: #374151;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --warning: #F59E0B;
      --teal: #14B8A6; --purple: #8B5CF6; --purple-light: #A78BFA;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
    .topbar { background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .teacher-name { font-size: 14px; font-weight: 600; }
    .teacher-role { font-size: 11px; color: var(--muted); }
    .btn-logout { padding: 6px 14px; background: transparent; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
    .btn-admin { padding: 6px 14px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.4); border-radius: 8px; color: var(--purple-light); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: none; }
    .btn-admin:hover { background: rgba(139,92,246,0.3); }
    .btn-admin.show { display: block; }
    .main { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .greeting { margin-bottom: 28px; }
    .greeting h2 { font-size: 24px; font-weight: 800; }
    .greeting p { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .roles-row { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .role-pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .role-teacher  { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }
    .role-homeroom { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .role-admin    { background: rgba(139,92,246,0.15); color: var(--purple-light); border: 1px solid rgba(139,92,246,0.3); }
    .tabs-row { display: flex; gap: 4px; margin-bottom: 24px; background: var(--dark2); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.07); width: fit-content; }
    .tab-btn { padding: 9px 20px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--blue); color: white; font-weight: 700; }
    .screen { display: none; }
    .screen.show { display: block; }
    .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .subject-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 22px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
    .subject-card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
    .subject-card::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; border-radius: 0 16px 16px 0; }
    .subject-card.tourism::before { background: linear-gradient(180deg, var(--teal), var(--blue)); }
    .subject-card.future::before { background: var(--dark4); }
    .subject-icon { font-size: 32px; margin-bottom: 12px; }
    .subject-name { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .subject-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .subject-arrow { position: absolute; top: 22px; left: 22px; font-size: 18px; color: var(--muted); transition: all 0.2s; }
    .subject-card:hover .subject-arrow { color: var(--blue-light); transform: translateX(-4px); }
    .subject-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 12px; }
    .badge-teal { background: rgba(20,184,166,0.15); color: var(--teal); border: 1px solid rgba(20,184,166,0.3); }
    .badge-gray { background: rgba(156,163,175,0.1); color: var(--muted); border: 1px solid rgba(156,163,175,0.2); }
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 11px 14px; text-align: right; background: var(--dark3); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.07); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 120px; }
    .progress-bar { flex: 1; height: 5px; background: var(--dark4); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-fill.tourism { background: linear-gradient(90deg, var(--teal), var(--blue)); }
    .progress-pct { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 28px; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
    .coming-soon { opacity: 0.5; pointer-events: none; }
    @media (max-width: 768px) {
      .main { padding: 16px; }
      .topbar { padding: 0 16px; }
      .subjects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">כיתה פלוס</div>
  <div class="topbar-right">
    <button class="btn-admin" id="adminBtn" onclick="goToAdmin()">⬡ ניהול מערכת</button>
    <div>
      <div class="teacher-name" id="teacherName">טוען...</div>
      <div class="teacher-role" id="teacherRoleLabel">מורה</div>
    </div>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="main">
  <div class="greeting">
    <h2 id="greetingText">שלום!</h2>
    <p id="greetingDate"></p>
  </div>

  <div class="roles-row" id="rolesRow"></div>

  <div class="tabs-row" id="tabsRow">
    <button class="tab-btn active" onclick="switchTab('subjects', this)">המקצועות שלי</button>
  </div>

  <div class="screen show" id="tab-subjects">
    <div class="subjects-grid" id="subjectsGrid">
      <div class="empty-state"><span class="loading-spinner"></span> טוען...</div>
    </div>
  </div>

  <div class="screen" id="tab-homeroom">
    <div class="card">
      <div class="card-title">התקדמות כיתה — כל המקצועות</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>תלמיד</th>
              <th>תיירות דיגיטלית</th>
              <th>מקצוע 2</th>
              <th>מקצוע 3</th>
            </tr>
          </thead>
          <tbody id="homeroomBody">
            <tr><td colspan="4" class="empty-state">טוען נתונים...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const TICHER_URL  = 'https://nisan1234-afk.github.io/TICHER/';
const TOURISM_URL = 'https://nisan1234-afk.github.io/tourismdigi/teacher.html';
const ADMIN_URL   = 'https://nisan1234-afk.github.io/TICHER/admin.html';
const TOURISM_API = 'https://script.google.com/macros/s/AKfycbx9FV1fICuoqHgX2zf2i7y6qFYc6R5BYP7CYS3ZPpotc0FigLs23SKM3XtWWZa4twk-/exec';

let currentUser = null;

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);

  const name = currentUser.name || currentUser.email || '';
  document.getElementById('teacherName').textContent = name;
  document.getElementById('greetingText').textContent = 'שלום, ' + name + '!';
  document.getElementById('greetingDate').textContent = formatDate();

  const roles = currentUser.roles || [currentUser.role || 'teacher'];
  renderRoles(roles);
  buildTabs(roles);
  renderSubjects(roles);

  // הצג כפתור אדמין רק אם יש תפקיד admin
  if (roles.includes('admin') || roles.includes('school_admin')) {
    document.getElementById('adminBtn').classList.add('show');
  }
};

function renderRoles(roles) {
  const labels = { teacher: 'מורה מקצועי', homeroom: 'מחנך', admin: 'אדמין', school_admin: 'אדמין בית ספר', student: 'תלמיד' };
  document.getElementById('rolesRow').innerHTML = roles.map(r =>
    '<span class="role-pill role-' + (r === 'school_admin' ? 'admin' : r) + '">' + (labels[r] || r) + '</span>'
  ).join('');
  document.getElementById('teacherRoleLabel').textContent = roles.map(r => labels[r] || r).join(' · ');
}

function buildTabs(roles) {
  const tabsRow = document.getElementById('tabsRow');
  if (roles.includes('homeroom')) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = 'ניהול כיתה';
    btn.onclick = function() { switchTab('homeroom', this); loadHomeroom(); };
    tabsRow.appendChild(btn);
  }
}

function renderSubjects(roles) {
  const isTeacher = roles.some(r => ['teacher','homeroom','school_admin','admin'].includes(r));
  const grid = document.getElementById('subjectsGrid');

  const subjects = [
    {
      id: 'tourism',
      icon: '🗺️',
      name: 'תיירות דיגיטלית',
      desc: 'ניתוח נוכחות דיגיטלית של אתרי תיירות — פרויקט שנתי בזוגות',
      url: TOURISM_URL,
      active: true,
      cssClass: 'tourism',
      badge: 'פעיל',
      badgeClass: 'badge-teal'
    },
    {
      id: 'future1',
      icon: '📚',
      name: 'מקצוע נוסף',
      desc: 'בקרוב — מקצוע נוסף יתווסף כאן',
      url: null,
      active: false,
      cssClass: 'future',
      badge: 'בקרוב',
      badgeClass: 'badge-gray'
    }
  ];

  if (!isTeacher) {
    grid.innerHTML = '<div class="empty-state">אין מקצועות משויכים לחשבון זה</div>';
    return;
  }

  grid.innerHTML = subjects.map(s => `
    <div class="subject-card ${s.cssClass} ${s.active ? '' : 'coming-soon'}" onclick="${s.active ? 'goToSubject(\'' + s.url + '\')' : ''}">
      <span class="subject-arrow">←</span>
      <div class="subject-icon">${s.icon}</div>
      <span class="subject-badge ${s.badgeClass}">${s.badge}</span>
      <div class="subject-name">${s.name}</div>
      <div class="subject-desc">${s.desc}</div>
    </div>
  `).join('');
}

function goToSubject(url) { if (url) window.location.href = url; }
function goToAdmin() { window.location.href = ADMIN_URL; }

async function loadHomeroom() {
  const tbody = document.getElementById('homeroomBody');
  tbody.innerHTML = '<tr><td colspan="4" class="empty-state"><span class="loading-spinner"></span> טוען...</td></tr>';
  try {
    const res  = await fetch(TOURISM_API, { method: 'POST', body: JSON.stringify({ action: 'getTeacherDashboard', token: currentUser.token }) });
    const data = await res.json();
    const pairs = data.ok ? (data.data.pairs || []) : [];
    if (!pairs.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty-state">אין נתונים עדיין</td></tr>'; return; }
    tbody.innerHTML = pairs.map(p => `
      <tr>
        <td><strong>${p.student1_email || '—'}</strong>${p.student2_email ? ' + ' + p.student2_email : ''}</td>
        <td><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill tourism" style="width:${p.percent}%"></div></div><div class="progress-pct">${p.percent}%</div></div></td>
        <td><span style="color:var(--muted);font-size:12px;">—</span></td>
        <td><span style="color:var(--muted);font-size:12px;">—</span></td>
      </tr>
    `).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">שגיאה בטעינה</td></tr>';
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('show');
}

function formatDate() {
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const d = new Date();
  return 'יום ' + days[d.getDay()] + ', ' + d.toLocaleDateString('he-IL', { day: 'numeric', month: 'long', year: 'numeric' });
}

function logout() {
  sessionStorage.removeItem('kitahUser');
  window.location.href = TICHER_URL;
}
</script>
</body>
</html>

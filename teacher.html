<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה פלוס — דשבורד מורה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937; --dark4: #374151;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --warning: #F59E0B;
      --teal: #14B8A6; --purple: #8B5CF6; --purple-light: #A78BFA;
      --orange: #F97316;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    /* TOPBAR */
    .topbar { background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-logo { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--purple-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .user-info { text-align: right; }
    .user-name { font-size: 14px; font-weight: 700; }
    .user-roles { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .btn-topbar { padding: 7px 14px; border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-homeroom { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); display: none; }
    .btn-homeroom.show { display: block; }
    .btn-homeroom:hover { background: rgba(245,158,11,0.25); }
    .btn-admin { background: rgba(139,92,246,0.15); color: var(--purple-light); border: 1px solid rgba(139,92,246,0.3); display: none; }
    .btn-admin.show { display: block; }
    .btn-admin:hover { background: rgba(139,92,246,0.25); }
    .btn-logout { padding: 7px 14px; background: transparent; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    /* MAIN */
    .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* GREETING */
    .greeting { margin-bottom: 32px; }
    .greeting-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .greeting h2 { font-size: 26px; font-weight: 800; }
    .greeting p { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .greeting-time { font-size: 13px; color: var(--muted); background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); padding: 6px 14px; border-radius: 8px; }

    /* ROLES PILLS */
    .roles-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .role-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .role-teacher  { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }
    .role-homeroom { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .role-admin    { background: rgba(139,92,246,0.15); color: var(--purple-light); border: 1px solid rgba(139,92,246,0.3); }
    .role-school_admin { background: rgba(139,92,246,0.15); color: var(--purple-light); border: 1px solid rgba(139,92,246,0.3); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px 20px; position: relative; overflow: hidden; }
    .stat-card::after { content: ''; position: absolute; bottom: 0; right: 0; width: 60px; height: 60px; border-radius: 50%; opacity: 0.06; }
    .stat-card.blue::after { background: var(--blue); }
    .stat-card.teal::after { background: var(--teal); }
    .stat-card.green::after { background: var(--success); }
    .stat-card.warning::after { background: var(--warning); }
    .stat-num { font-size: 30px; font-weight: 800; }
    .stat-card.blue .stat-num { color: var(--blue-light); }
    .stat-card.teal .stat-num { color: var(--teal); }
    .stat-card.green .stat-num { color: var(--success); }
    .stat-card.warning .stat-num { color: var(--warning); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* TABS */
    .tabs-row { display: flex; gap: 4px; margin-bottom: 24px; background: var(--dark2); border-radius: 12px; padding: 4px; border: 1px solid rgba(255,255,255,0.07); width: fit-content; }
    .tab-btn { padding: 9px 20px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: var(--blue); color: white; font-weight: 700; }

    .screen { display: none; }
    .screen.show { display: block; }

    /* SUBJECTS GRID */
    .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .subject-card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
    .subject-card:hover { border-color: rgba(59,130,246,0.4); transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,0.4); }
    .subject-card::before { content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%; }
    .subject-card.tourism::before { background: linear-gradient(180deg, var(--teal), var(--blue)); }
    .subject-card.future::before { background: var(--dark4); }
    .subject-icon { font-size: 36px; margin-bottom: 14px; }
    .subject-name { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .subject-desc { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
    .subject-footer { display: flex; align-items: center; justify-content: space-between; }
    .subject-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-teal { background: rgba(20,184,166,0.15); color: var(--teal); border: 1px solid rgba(20,184,166,0.3); }
    .badge-gray { background: rgba(156,163,175,0.1); color: var(--muted); border: 1px solid rgba(156,163,175,0.2); }
    .subject-arrow { font-size: 20px; color: var(--muted); transition: all 0.2s; }
    .subject-card:hover .subject-arrow { color: var(--blue-light); transform: translateX(-4px); }

    /* MINI PROGRESS in subject card */
    .subject-progress { margin-top: 14px; }
    .mini-bar { height: 4px; background: var(--dark3); border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
    .mini-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--teal), var(--blue)); transition: width 0.5s; }
    .mini-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }

    /* CARD */
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .card-title { font-size: 15px; font-weight: 700; }

    /* ACTIVITY FEED */
    .activity-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: flex-start; }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .dot-blue { background: rgba(59,130,246,0.15); }
    .dot-teal { background: rgba(20,184,166,0.15); }
    .dot-green { background: rgba(16,185,129,0.15); }
    .activity-text { font-size: 13px; line-height: 1.5; }
    .activity-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* LOADING */
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
    .coming-soon { opacity: 0.45; pointer-events: none; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 16px; }
      .topbar { padding: 0 16px; }
      .subjects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">כיתה פלוס</div>
  </div>
  <div class="topbar-right">
    <button class="btn-topbar btn-homeroom" id="homeroomBtn" onclick="goToHomeroom()">🏠 ניהול כיתה</button>
    <button class="btn-topbar btn-admin" id="adminBtn" onclick="goToAdmin()">⬡ ניהול מערכת</button>
    <div class="user-info">
      <div class="user-name" id="userName">טוען...</div>
      <div class="user-roles" id="userRoles"></div>
    </div>
    <button class="btn-logout" onclick="logout()">יציאה</button>
  </div>
</div>

<div class="main">

  <div class="greeting">
    <div class="greeting-top">
      <div>
        <h2 id="greetingText">שלום!</h2>
        <p id="greetingDate"></p>
      </div>
      <div class="greeting-time" id="greetingTime"></div>
    </div>
    <div class="roles-row" id="rolesRow"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card blue">
      <div class="stat-num" id="statSubjects">—</div>
      <div class="stat-label">מקצועות פעילים</div>
    </div>
    <div class="stat-card teal">
      <div class="stat-num" id="statPairs">—</div>
      <div class="stat-label">זוגות בתיירות</div>
      <div class="stat-sub" id="statPairsSub"></div>
    </div>
    <div class="stat-card green">
      <div class="stat-num" id="statAvg">—</div>
      <div class="stat-label">התקדמות ממוצעת</div>
    </div>
    <div class="stat-card warning">
      <div class="stat-num" id="statStuck">—</div>
      <div class="stat-label">זוגות לא פעילים</div>
      <div class="stat-sub">מעל שבוע</div>
    </div>
  </div>

  <div class="tabs-row" id="tabsRow">
    <button class="tab-btn active" onclick="switchTab('subjects', this)">המקצועות שלי</button>
    <button class="tab-btn" onclick="switchTab('activity', this)">פעילות אחרונה</button>
  </div>

  <!-- מקצועות -->
  <div class="screen show" id="tab-subjects">
    <div class="subjects-grid" id="subjectsGrid">
      <div class="empty-state"><span class="loading-spinner"></span> טוען...</div>
    </div>
  </div>

  <!-- פעילות -->
  <div class="screen" id="tab-activity">
    <div class="card">
      <div class="card-title">פעילות אחרונה — כל הזוגות</div>
      <div id="activityFeed">
        <div class="empty-state"><span class="loading-spinner"></span> טוען...</div>
      </div>
    </div>
  </div>

</div>

<script>
const TICHER_URL    = 'https://nisan1234-afk.github.io/TICHER/';
const TOURISM_URL   = 'https://nisan1234-afk.github.io/tourismdigi/teacher.html';
const HOMEROOM_URL  = 'https://nisan1234-afk.github.io/TICHER/homeroom.html';
const ADMIN_URL     = 'https://nisan1234-afk.github.io/TICHER/admin.html';
const API_URL       = 'https://script.google.com/macros/s/AKfycbxZ6mV34krIaH1MkIerwnAiEaQEqrjFSoQrln10Au20X-kbfe3UW8Bac9IP4RYzUqd4/exec';

let currentUser = null;
let dashboardData = null;

window.onload = async function() {
  const stored = sessionStorage.getItem('kitahUser');
  if (!stored) { window.location.href = TICHER_URL; return; }
  currentUser = JSON.parse(stored);

  const name  = currentUser.name || currentUser.email || '';
  const roles = currentUser.roles || [currentUser.role || 'teacher'];

  document.getElementById('userName').textContent = name;
  document.getElementById('greetingText').textContent = 'שלום, ' + name.split(' ')[0] + '!';
  document.getElementById('greetingDate').textContent = formatDate();
  updateClock();
  setInterval(updateClock, 60000);

  renderRoles(roles);

  if (roles.includes('homeroom')) document.getElementById('homeroomBtn').classList.add('show');
  if (roles.includes('admin') || roles.includes('school_admin')) document.getElementById('adminBtn').classList.add('show');

  await loadDashboard();
};

async function callAPI(action, params = {}) {
  const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: currentUser.token, ...params }) });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error);
  return data.data;
}

async function loadDashboard() {
  try {
    dashboardData = await callAPI('getTeacherDashboard', { token: currentUser.token });
    const pairs = dashboardData.pairs || [];

    const avg  = pairs.length ? Math.round(pairs.reduce((s, p) => s + p.percent, 0) / pairs.length) : 0;
    const stuck = pairs.filter(p => {
      if (!p.last_active) return true;
      return Date.now() - new Date(p.last_active).getTime() > 7 * 24 * 60 * 60 * 1000;
    }).length;

    document.getElementById('statSubjects').textContent = '1';
    document.getElementById('statPairs').textContent    = pairs.length;
    document.getElementById('statPairsSub').textContent = pairs.length + ' זוגות רשומים';
    document.getElementById('statAvg').textContent      = avg + '%';
    document.getElementById('statStuck').textContent    = stuck;

    renderSubjects(pairs);
    renderActivity(pairs);
  } catch(e) {
    document.getElementById('subjectsGrid').innerHTML = '<div class="empty-state">שגיאה: ' + e.message + '</div>';
  }
}

function renderRoles(roles) {
  const labels = { teacher: 'מורה מקצועי', homeroom: 'מחנך', admin: 'אדמין-על', school_admin: 'אדמין', student: 'תלמיד' };
  document.getElementById('rolesRow').innerHTML = roles.map(r =>
    '<span class="role-pill role-' + r + '">' + (labels[r] || r) + '</span>'
  ).join('');
  document.getElementById('userRoles').textContent = roles.map(r => labels[r] || r).join(' · ');
}

function renderSubjects(pairs) {
  const avg = pairs.length ? Math.round(pairs.reduce((s, p) => s + p.percent, 0) / pairs.length) : 0;
  const grid = document.getElementById('subjectsGrid');

  const subjects = [
    {
      id: 'tourism', icon: '🗺️', name: 'תיירות דיגיטלית',
      desc: 'ניתוח נוכחות דיגיטלית של אתרי תיירות — פרויקט שנתי בזוגות',
      url: TOURISM_URL, active: true, cssClass: 'tourism',
      badge: 'פעיל', badgeClass: 'badge-teal',
      progress: avg, progressLabel: avg + '% התקדמות ממוצעת · ' + pairs.length + ' זוגות'
    },
    {
      id: 'future1', icon: '📐', name: 'מקצוע נוסף',
      desc: 'בקרוב — מקצוע נוסף יתווסף כאן',
      url: null, active: false, cssClass: 'future',
      badge: 'בקרוב', badgeClass: 'badge-gray', progress: 0, progressLabel: ''
    }
  ];

  grid.innerHTML = subjects.map(s => `
    <div class="subject-card ${s.cssClass} ${s.active ? '' : 'coming-soon'}" onclick="${s.active ? 'window.location.href=\'' + s.url + '\'' : ''}">
      <div class="subject-icon">${s.icon}</div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-desc">${s.desc}</div>
      ${s.active && s.progress > 0 ? `
      <div class="subject-progress">
        <div class="mini-bar"><div class="mini-fill" style="width:${s.progress}%"></div></div>
        <div class="mini-label"><span>${s.progressLabel}</span><span>${s.progress}%</span></div>
      </div>` : ''}
      <div class="subject-footer">
        <span class="subject-badge ${s.badgeClass}">${s.badge}</span>
        <span class="subject-arrow">←</span>
      </div>
    </div>
  `).join('');
}

function renderActivity(pairs) {
  const feed = document.getElementById('activityFeed');
  const active = pairs.filter(p => p.last_active).sort((a, b) =>
    new Date(b.last_active) - new Date(a.last_active)
  ).slice(0, 10);

  if (!active.length) {
    feed.innerHTML = '<div class="empty-state">אין פעילות מתועדת עדיין</div>';
    return;
  }

  feed.innerHTML = active.map(p => {
    const timeAgo = formatTimeAgo(p.last_active);
    const icon = p.percent === 100 ? '✅' : p.percent > 50 ? '📝' : '🔄';
    const dotClass = p.percent === 100 ? 'dot-green' : p.percent > 50 ? 'dot-teal' : 'dot-blue';
    return `
      <div class="activity-item">
        <div class="activity-dot ${dotClass}">${icon}</div>
        <div>
          <div class="activity-text">
            <strong>${p.site_name || 'אתר לא נבחר'}</strong> — סעיף ${p.current_section || '—'} · ${p.percent}% הושלמו
          </div>
          <div class="activity-time">${timeAgo}</div>
        </div>
      </div>
    `;
  }).join('');
}

function formatTimeAgo(ts) {
  if (!ts) return 'לא פעיל';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  const hrs  = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1)  return 'ממש עכשיו';
  if (mins < 60) return 'לפני ' + mins + ' דקות';
  if (hrs < 24)  return 'לפני ' + hrs + ' שעות';
  return 'לפני ' + days + ' ימים';
}

function updateClock() {
  const now = new Date();
  document.getElementById('greetingTime').textContent =
    now.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

function formatDate() {
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const d = new Date();
  return 'יום ' + days[d.getDay()] + ', ' + d.toLocaleDateString('he-IL', { day: 'numeric', month: 'long', year: 'numeric' });
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('show');
}

function goToHomeroom() { window.location.href = HOMEROOM_URL; }
function goToAdmin()    { window.location.href = ADMIN_URL; }
function logout()       { sessionStorage.removeItem('kitahUser'); window.location.href = TICHER_URL; }
</script>
</body>
</html>

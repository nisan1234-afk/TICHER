<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה פלוס — כניסה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --admin: #8B5CF6; --admin-light: #A78BFA;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(59,130,246,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 70%, rgba(139,92,246,0.08) 0%, transparent 60%), var(--dark); }
    .bg-circles { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-circles span { position: absolute; border-radius: 50%; border: 1px solid rgba(59,130,246,0.08); }
    .bg-circles span:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -100px; }
    .bg-circles span:nth-child(2) { width: 600px; height: 600px; top: -200px; right: -200px; }
    .bg-circles span:nth-child(3) { width: 300px; height: 300px; bottom: -80px; left: -80px; border-color: rgba(139,92,246,0.08); }
    .container { position: relative; z-index: 1; width: 100%; max-width: 430px; padding: 24px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: linear-gradient(135deg, var(--blue), var(--admin)); border-radius: 16px; margin-bottom: 14px; box-shadow: 0 8px 32px rgba(59,130,246,0.3); }
    .logo-mark svg { width: 32px; height: 32px; }
    .logo h1 { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--admin-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 5px; }
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 32px 28px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
    .card-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }
    .google-btn { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; background: var(--dark3); color: var(--text); font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; }
    .google-btn:hover { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.05); transform: translateY(-1px); }
    .google-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .google-icon { width: 22px; height: 22px; flex-shrink: 0; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--error); border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .error-msg.show { display: block; }
    .success-msg { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: var(--success); border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .success-msg.show { display: block; }
    .screen { display: none; }
    .screen.show { display: block; }
    .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .not-registered { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
    .not-registered a { color: var(--blue-light); text-decoration: none; font-weight: 600; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 12px 14px; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; direction: ltr; }
    input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    input::placeholder { color: #4B5563; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
    .btn-primary { background: var(--blue); color: white; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-ghost { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); margin-top: 10px; }
    .user-preview { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--dark3); border-radius: 12px; margin-bottom: 20px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--admin)); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; flex-shrink: 0; }
    .user-name { font-size: 14px; font-weight: 700; }
    .user-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .pending-info { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); color: #F59E0B; border-radius: 10px; padding: 14px 16px; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-circles"><span></span><span></span><span></span></div>

<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 32 32" fill="none">
        <rect x="4" y="8" width="24" height="18" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M4 13H28" stroke="white" stroke-width="1.5"/>
        <circle cx="9" cy="10.5" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="14" cy="10.5" r="1.5" fill="white" opacity="0.6"/>
        <path d="M10 19H22M10 23H18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>כיתה פלוס</h1>
    <p>מערכת ניהול למידה חכמה</p>
  </div>

  <div class="card">
    <div class="screen show" id="loginScreen">
      <div class="card-title">כניסה למערכת</div>
      <div class="card-sub">היכנס עם חשבון הגוגל שלך — אותו חשבון שרשום במערכת.</div>
      <div class="error-msg" id="loginError"></div>
      <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        כניסה עם Google
      </button>
      <div class="not-registered">
        מורה חדש? <a href="#" onclick="showScreen('registerScreen')">הרשמה למערכת</a>
      </div>
    </div>

    <div class="screen" id="loadingScreen">
      <div style="text-align:center;padding:30px 0;">
        <div class="loading-spinner" style="width:32px;height:32px;margin:0 auto 16px;border-width:3px;"></div>
        <div style="font-size:15px;font-weight:600;" id="loadingText">מאמת זהות...</div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px;">רגע אחד</div>
      </div>
    </div>

    <div class="screen" id="pendingScreen">
      <div class="user-preview">
        <div class="user-avatar" id="pendingAvatar">?</div>
        <div>
          <div class="user-name" id="pendingName"></div>
          <div class="user-email" id="pendingEmail"></div>
        </div>
      </div>
      <div class="pending-info">
        ✋ הבקשה שלך התקבלה!<br><br>
        המנהל צריך לאשר את חשבונך לפני שתוכל להיכנס.<br>
        תקבל הודעה כשהחשבון יאושר.
      </div>
      <button class="btn btn-ghost" onclick="signOut()">כניסה עם חשבון אחר</button>
    </div>

    <div class="screen" id="registerScreen">
      <div class="card-title">הרשמת מורה חדש</div>
      <div class="card-sub">מלא את הפרטים — המנהל יאשר את חשבונך.</div>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
      <div class="form-group"><label>שם מלא</label><input type="text" id="regName" placeholder="שם פרטי ושם משפחה" /></div>
      <div class="form-group"><label>מייל (חשבון גוגל)</label><input type="email" id="regEmail" placeholder="example@gmail.com" /></div>
      <div class="form-group"><label>טלפון</label><input type="tel" id="regPhone" placeholder="0501234567" /></div>
      <button class="btn btn-primary" id="registerBtn" onclick="handleRegister()">שליחת בקשה</button>
      <button class="btn btn-ghost" onclick="showScreen('loginScreen')">חזרה</button>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const CLIENT_ID = '988232727899-pajp4mhs43tet1phcu3rc8c8mutsgpme.apps.googleusercontent.com';
  const API_URL   = 'https://script.google.com/macros/s/AKfycbx9FV1fICuoqHgX2zf2i7y6qFYc6R5BYP7CYS3ZPpotc0FigLs23SKM3XtWWZa4twk-/exec';

  let googleToken = null;

  function signInWithGoogle() {
    google.accounts.id.initialize({
      client_id:   CLIENT_ID,
      callback:    handleGoogleResponse,
      auto_select: false,
      use_fedcm_for_prompt: true
    });
    google.accounts.id.prompt();
  }

  async function handleGoogleResponse(response) {
    googleToken = response.credential;
    showScreen('loadingScreen');
    try {
      const data = await callAPI('getMyProfile', { token: googleToken });
      const user = { ...data, token: googleToken };
      sessionStorage.setItem('kitahUser', JSON.stringify(user));
      goToDashboard(user);
    } catch(e) {
      if (e.message.includes('ממתין')) {
        const info = parseToken(googleToken);
        document.getElementById('pendingAvatar').textContent = (info.name || '?')[0];
        document.getElementById('pendingName').textContent   = info.name || '';
        document.getElementById('pendingEmail').textContent  = info.email || '';
        showScreen('pendingScreen');
      } else if (e.message.includes('לא נמצא')) {
        showScreen('loginScreen');
        showError('loginError', 'החשבון לא רשום במערכת. פנה למורה או הירשם.');
      } else {
        showScreen('loginScreen');
        showError('loginError', e.message);
      }
    }
  }

  function goToDashboard(user) {
    const roles = user.roles || [user.role];
    window.location.href = roles.includes('student') ? 'student.html' : 'teacher.html';
  }

  async function handleRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const btn   = document.getElementById('registerBtn');
    if (!name || !email) { showError('registerError', 'נא למלא שם ומייל'); return; }
    btn.disabled = true;
    btn.innerHTML = 'שולח...<span class="loading-spinner" style="margin-right:8px;"></span>';
    try {
      await callAPI('registerTeacher', { name, email, phone });
      document.getElementById('registerSuccess').textContent = '✅ הבקשה התקבלה! המנהל יאשר את חשבונך בקרוב.';
      document.getElementById('registerSuccess').classList.add('show');
      setTimeout(() => showScreen('loginScreen'), 3000);
    } catch(e) { showError('registerError', e.message); }
    btn.disabled = false;
    btn.textContent = 'שליחת בקשה';
  }

  function signOut() {
    sessionStorage.removeItem('kitahUser');
    googleToken = null;
    google.accounts.id.disableAutoSelect();
    showScreen('loginScreen');
  }

  async function callAPI(action, params = {}) {
    const res  = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...params }) });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'שגיאה');
    return data.data;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
    document.getElementById(id).classList.add('show');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  function parseToken(token) {
    try { return JSON.parse(atob(token.split('.')[1])); } catch(e) { return {}; }
  }

  window.onload = function() {
    const stored = sessionStorage.getItem('kitahUser');
    if (stored) {
      const user = JSON.parse(stored);
      const info = parseToken(user.token || '');
      if (info.exp && Date.now() / 1000 < info.exp) { goToDashboard(user); return; }
      sessionStorage.removeItem('kitahUser');
    }
  };
</script>
</body>
</html>

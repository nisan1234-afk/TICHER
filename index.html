<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>כיתה פלוס — כניסה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3B82F6; --blue-dark: #2563EB; --blue-light: #93C5FD;
      --dark: #0A0F1E; --dark2: #111827; --dark3: #1F2937;
      --text: #F9FAFB; --muted: #9CA3AF; --error: #EF4444;
      --success: #10B981; --admin: #8B5CF6; --admin-light: #A78BFA;
    }
    body { font-family: 'Heebo', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 50% at 30% 20%, rgba(59,130,246,0.12) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 70%, rgba(139,92,246,0.08) 0%, transparent 60%), var(--dark); }
    .bg-circles { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-circles span { position: absolute; border-radius: 50%; border: 1px solid rgba(59,130,246,0.08); }
    .bg-circles span:nth-child(1) { width: 400px; height: 400px; top: -100px; right: -100px; }
    .bg-circles span:nth-child(2) { width: 600px; height: 600px; top: -200px; right: -200px; }
    .bg-circles span:nth-child(3) { width: 300px; height: 300px; bottom: -80px; left: -80px; border-color: rgba(139,92,246,0.08); }
    .container { position: relative; z-index: 1; width: 100%; max-width: 430px; padding: 24px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .logo { text-align: center; margin-bottom: 36px; }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 60px; height: 60px; background: linear-gradient(135deg, var(--blue), var(--admin)); border-radius: 16px; margin-bottom: 14px; box-shadow: 0 8px 32px rgba(59,130,246,0.3); }
    .logo-mark svg { width: 32px; height: 32px; }
    .logo h1 { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, var(--blue-light), var(--admin-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.5px; }
    .logo p { font-size: 13px; color: var(--muted); margin-top: 5px; font-weight: 300; }
    .card { background: var(--dark2); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 28px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
    .tabs { display: flex; background: var(--dark3); border-radius: 12px; padding: 4px; margin-bottom: 26px; gap: 3px; }
    .tab { flex: 1; padding: 9px 6px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab.active-student { background: var(--blue); color: white; font-weight: 700; }
    .tab.active-teacher { background: var(--blue-dark); color: white; font-weight: 700; }
    .tab.active-admin { background: var(--admin); color: white; font-weight: 700; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 12px 15px; background: var(--dark3); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; direction: rtl; }
    input:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    input::placeholder { color: #4B5563; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: all 0.2s; }
    .btn-student { background: var(--blue); color: white; }
    .btn-student:hover { background: var(--blue-dark); box-shadow: 0 8px 24px rgba(59,130,246,0.3); transform: translateY(-1px); }
    .btn-teacher { background: var(--blue-dark); color: white; }
    .btn-teacher:hover { background: #1D4ED8; box-shadow: 0 8px 24px rgba(37,99,235,0.3); transform: translateY(-1px); }
    .btn-admin { background: var(--admin); color: white; }
    .btn-admin:hover { background: #7C3AED; box-shadow: 0 8px 24px rgba(139,92,246,0.3); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    .register-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
    .register-link a { color: var(--blue-light); text-decoration: none; font-weight: 500; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: var(--error); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; line-height: 1.5; }
    .error-msg.show { display: block; }
    .success-msg { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: var(--success); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; line-height: 1.5; }
    .success-msg.show { display: block; }
    .screen { display: none; }
    .screen.show { display: block; }
    .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .admin-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); color: var(--admin-light); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--dark3); border-radius: 10px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--admin-light); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .teacher-list { background: var(--dark3); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); max-height: 200px; overflow-y: auto; }
    .teacher-list-header { padding: 10px 14px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; background: var(--dark3); }
    .teacher-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
    .teacher-row:last-child { border-bottom: none; }
    .teacher-name { font-weight: 600; }
    .teacher-meta { color: var(--muted); font-size: 12px; margin-top: 1px; }
    .teacher-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm { padding: 4px 10px; border-radius: 6px; border: none; font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-sm:hover { opacity: 0.8; }
    .btn-approve { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .btn-block { background: rgba(239,68,68,0.15); color: var(--error); border: 1px solid rgba(239,68,68,0.3); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-left: 5px; }
    .status-pending { background: #F59E0B; }
    .status-active { background: var(--success); }
    .status-blocked { background: var(--error); }
    .pending-badge { background: rgba(245,158,11,0.15); color: #F59E0B; border: 1px solid rgba(245,158,11,0.3); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700; }
    .divider { height: 1px; background: rgba(255,255,255,0.05); margin: 16px 0; }
    .btn-logout { width: 100%; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--muted); font-family: 'Heebo', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; margin-top: 14px; }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }
    .empty-state { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-circles"><span></span><span></span><span></span></div>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="8" width="24" height="18" rx="3" stroke="white" stroke-width="1.5" fill="none"/>
        <path d="M4 13H28" stroke="white" stroke-width="1.5"/>
        <circle cx="9" cy="10.5" r="1.5" fill="white" opacity="0.6"/>
        <circle cx="14" cy="10.5" r="1.5" fill="white" opacity="0.6"/>
        <path d="M10 19H22M10 23H18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>כיתה פלוס</h1>
    <p>מערכת ניהול למידה חכמה</p>
  </div>
  <div class="card">
    <div class="tabs" id="tabsBar">
      <button class="tab active-student" onclick="switchTab('student')">תלמיד</button>
      <button class="tab" onclick="switchTab('teacher')">מורה</button>
      <button class="tab" onclick="switchTab('admin')">אדמין</button>
    </div>

    <!-- כניסה -->
    <div class="screen show" id="loginScreen">
      <div class="error-msg" id="loginError"></div>
      <div class="form-group"><label>שם משתמש</label><input type="text" id="username" placeholder="הכנס שם משתמש" /></div>
      <div class="form-group"><label>סיסמה</label><input type="password" id="password" placeholder="הכנס סיסמה" onkeydown="if(event.key==='Enter') handleLogin()" /></div>
      <button class="btn btn-student" id="loginBtn" onclick="handleLogin()">כניסה</button>
      <div class="register-link" id="registerLinkWrap" style="display:none">מורה חדש? <a href="#" onclick="showScreen('registerScreen')">הרשמה למערכת</a></div>
    </div>

    <!-- הרשמת מורה -->
    <div class="screen" id="registerScreen">
      <div style="font-size:17px;font-weight:700;color:var(--blue-light);margin-bottom:5px;">הרשמת מורה חדש</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:22px;">מלא את הפרטים — המנהל יאשר את חשבונך.</div>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
      <div class="form-group"><label>שם מלא</label><input type="text" id="regName" placeholder="שם פרטי ושם משפחה" /></div>
      <div class="form-group"><label>אימייל</label><input type="email" id="regEmail" placeholder="example@gmail.com" dir="ltr" /></div>
      <div class="form-group"><label>טלפון</label><input type="tel" id="regPhone" placeholder="050-0000000" dir="ltr" /></div>
      <button class="btn btn-teacher" id="registerBtn" onclick="handleRegister()">הרשמה</button>
      <div class="register-link"><a href="#" onclick="showScreen('loginScreen')">חזרה לכניסה</a></div>
    </div>

    <!-- החלפת סיסמה -->
    <div class="screen" id="changePasswordScreen">
      <div style="font-size:17px;font-weight:700;color:var(--blue-light);margin-bottom:5px;">החלפת סיסמה</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:22px;">זוהי כניסתך הראשונה. בחר סיסמה אישית.</div>
      <div class="error-msg" id="changeError"></div>
      <div class="success-msg" id="changeSuccess">הסיסמה שונתה! מעביר אותך...</div>
      <div class="form-group"><label>סיסמה חדשה</label><input type="password" id="newPassword" placeholder="לפחות 6 תווים" /></div>
      <div class="form-group"><label>אימות סיסמה</label><input type="password" id="confirmPassword" placeholder="הכנס שוב את הסיסמה" /></div>
      <button class="btn btn-student" id="changeBtn" onclick="handleChangePassword()">שמירה וכניסה</button>
    </div>

    <!-- פאנל אדמין -->
    <div class="screen" id="adminPanel">
      <div class="admin-badge">⬡ פאנל ניהול</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-num" id="statTeachers">—</div><div class="stat-label">מורים פעילים</div></div>
        <div class="stat-card"><div class="stat-num" id="statStudents">—</div><div class="stat-label">תלמידים</div></div>
        <div class="stat-card"><div class="stat-num" id="statPending">—</div><div class="stat-label">ממתינים לאישור</div></div>
        <div class="stat-card"><div class="stat-num" id="statTopics">—</div><div class="stat-label">נושאים</div></div>
      </div>
      <div class="teacher-list" id="teacherListContainer">
        <div class="teacher-list-header">רשימת מורים</div>
        <div class="empty-state"><span class="loading-spinner" style="border-top-color:var(--admin-light);border-color:rgba(139,92,246,0.3);"></span> טוען...</div>
      </div>
      <div class="divider"></div>
      <button class="btn-logout" onclick="adminLogout()">יציאה</button>
    </div>
  </div>
</div>

<script>
  const SHEET_ID   = '10PxA-ynfG-6d5-FCW54stsz6dLK0c9Qxggl103rjg6A';
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVx9E0fA6fEQS7I4cRpZTFtLB0_jOu2BnbP8zEBJ67rVFIAD6GxEBuov0KFy0xccFA/exec';
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'admin1234';
  let currentTab = 'student';
  let currentUser = null;
  let allTeachers = [];

  async function fetchSheet(sheetName) {
    const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName);
    try {
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const cols = json.table.cols.map(c => c.label);
      const rows = json.table.rows.map((r, ri) =>
        Object.assign({ _row: ri + 2 }, Object.fromEntries(cols.map((c, i) => [c, r.c[i] ? r.c[i].v : ''])))
      );
      return rows;
    } catch(e) { return []; }
  }

  async function callScript(params) {
    try {
      const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      const text = await res.text();
      try { return JSON.parse(text); } catch(e) { return { success: true }; }
    } catch(e) { return { success: false }; }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    const tabs = document.querySelectorAll('.tab');
    if (tab === 'student') tabs[0].className = 'tab active-student';
    if (tab === 'teacher') tabs[1].className = 'tab active-teacher';
    if (tab === 'admin')   tabs[2].className = 'tab active-admin';
    document.getElementById('loginBtn').className  = tab === 'admin' ? 'btn btn-admin' : tab === 'teacher' ? 'btn btn-teacher' : 'btn btn-student';
    document.getElementById('changeBtn').className = tab === 'teacher' ? 'btn btn-teacher' : 'btn btn-student';
    document.getElementById('registerLinkWrap').style.display = tab === 'teacher' ? 'block' : 'none';
    showScreen('loginScreen');
    document.querySelectorAll('.error-msg, .success-msg').forEach(el => el.classList.remove('show'));
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('show'));
    document.getElementById(id).classList.add('show');
  }

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('loginError');
    errorEl.classList.remove('show');
    if (!username || !password) { errorEl.textContent = 'נא למלא את כל השדות'; errorEl.classList.add('show'); return; }
    if (currentTab === 'admin') {
      if (username === ADMIN_USER && password === ADMIN_PASS) {
        document.getElementById('tabsBar').style.display = 'none';
        showScreen('adminPanel'); loadAdminData();
      } else { errorEl.textContent = 'שם משתמש או סיסמה שגויים'; errorEl.classList.add('show'); }
      return;
    }
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true; loginBtn.innerHTML = '<span class="loading-spinner"></span>מתחבר...';
    const users = await fetchSheet(currentTab === 'teacher' ? 'מורים' : 'תלמידים');
    loginBtn.disabled = false; loginBtn.textContent = 'כניסה';
    const user = users.find(u => (currentTab === 'teacher' ? String(u.email).trim() === username : String(u.username).trim() === username) && String(u.password) === String(password));
    if (!user) { errorEl.textContent = 'שם משתמש או סיסמה שגויים'; errorEl.classList.add('show'); return; }
    if (user.status === 'blocked') { errorEl.textContent = 'החשבון שלך חסום. פנה למנהל.'; errorEl.classList.add('show'); return; }
    if (user.status === 'pending') { errorEl.textContent = 'החשבון ממתין לאישור המנהל.'; errorEl.classList.add('show'); return; }
    currentUser = { ...user, role: currentTab };
    if (String(user.password) === '1234') { showScreen('changePasswordScreen'); } else { goToDashboard(); }
  }

  async function handleChangePassword() {
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    const errorEl = document.getElementById('changeError');
    const btn = document.getElementById('changeBtn');
    errorEl.classList.remove('show');
    if (newPass.length < 6) { errorEl.textContent = 'לפחות 6 תווים'; errorEl.classList.add('show'); return; }
    if (newPass !== confirmPass) { errorEl.textContent = 'הסיסמאות אינן תואמות'; errorEl.classList.add('show'); return; }
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>שומר...';
    await callScript({ action: 'updatePassword', role: currentUser.role, username: currentUser.role === 'teacher' ? currentUser.email : currentUser.username, newPassword: newPass });
    btn.disabled = false; btn.textContent = 'שמירה וכניסה';
    document.getElementById('changeSuccess').classList.add('show');
    setTimeout(() => goToDashboard(), 1500);
  }

  async function handleRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const errorEl = document.getElementById('registerError');
    const successEl = document.getElementById('registerSuccess');
    const btn = document.getElementById('registerBtn');
    errorEl.classList.remove('show'); successEl.classList.remove('show');
    if (!name || !email || !phone) { errorEl.textContent = 'נא למלא את כל השדות'; errorEl.classList.add('show'); return; }
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>שולח...';
    const result = await callScript({ action: 'registerTeacher', name, email, phone });
    btn.disabled = false; btn.textContent = 'הרשמה';
    if (result.success) {
      successEl.textContent = 'ההרשמה התקבלה! המנהל יאשר את חשבונך בקרוב. סיסמה זמנית: 1234';
      successEl.classList.add('show');
      setTimeout(() => showScreen('loginScreen'), 4000);
    } else { errorEl.textContent = 'שגיאה בשליחה. נסה שוב.'; errorEl.classList.add('show'); }
  }

  async function loadAdminData() {
    try {
      const teachers = await fetchSheet('מורים');
      const students = await fetchSheet('תלמידים');
      allTeachers = teachers;
      document.getElementById('statTeachers').textContent = teachers.filter(t => t.status === 'active').length;
      document.getElementById('statStudents').textContent = students.length;
      document.getElementById('statPending').textContent  = teachers.filter(t => t.status === 'pending').length;
      document.getElementById('statTopics').textContent   = '—';
      renderTeacherList(teachers);
    } catch(e) { console.error('שגיאה:', e); }
  }

  function renderTeacherList(teachers) {
    const container = document.getElementById('teacherListContainer');
    if (!teachers.length) { container.innerHTML = '<div class="teacher-list-header">רשימת מורים</div><div class="empty-state">אין מורים רשומים עדיין</div>'; return; }
    let html = '<div class="teacher-list-header">רשימת מורים</div>';
    teachers.forEach((t, i) => {
      const status  = t.status || 'pending';
      const dot     = '<span class="status-dot status-' + status + '"></span>';
      const badge   = status === 'pending' ? '<span class="pending-badge">ממתין</span>' : '';
      const actions = status === 'pending'
        ? '<button class="btn-sm btn-approve" onclick="approveTeacher(' + i + ')">אשר</button><button class="btn-sm btn-block" onclick="blockTeacher(' + i + ')">דחה</button>'
        : status === 'blocked' ? '<span style="color:var(--error);font-size:11px;">חסום</span>'
        : '<button class="btn-sm btn-block" onclick="blockTeacher(' + i + ')">חסום</button>';
      html += '<div class="teacher-row"><div><div class="teacher-name">' + dot + (t.name || t.email) + ' ' + badge + '</div><div class="teacher-meta">' + (t.students_count || 0) + ' תלמידים · ' + (t.topics || 0) + ' נושאים</div></div><div class="teacher-actions">' + actions + '</div></div>';
    });
    container.innerHTML = html;
  }

  async function approveTeacher(i) {
    allTeachers[i].status = 'active';
    renderTeacherList(allTeachers); updateAdminStats();
    await callScript({ action: 'updateTeacherStatus', row: allTeachers[i]._row, status: 'active' });
  }

  async function blockTeacher(i) {
    if (confirm('האם לחסום את ' + (allTeachers[i].name || allTeachers[i].email) + '?')) {
      allTeachers[i].status = 'blocked';
      renderTeacherList(allTeachers); updateAdminStats();
      await callScript({ action: 'updateTeacherStatus', row: allTeachers[i]._row, status: 'blocked' });
    }
  }

  function updateAdminStats() {
    document.getElementById('statTeachers').textContent = allTeachers.filter(t => t.status === 'active').length;
    document.getElementById('statPending').textContent  = allTeachers.filter(t => t.status === 'pending').length;
  }

  function adminLogout() {
    document.getElementById('tabsBar').style.display = 'flex';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    switchTab('student');
  }

  function goToDashboard() {
    alert('ברוך הבא ' + (currentUser.name || currentUser.email) + '! דשבורד ' + (currentUser.role === 'teacher' ? 'מורה' : 'תלמיד') + ' — בפיתוח');
  }
</script>
</body>
</html>
